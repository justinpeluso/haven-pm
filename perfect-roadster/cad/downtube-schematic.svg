<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <title>Perfect Roadster  pack cavity side schematic</title>
  <style>
    .label { font: 14px ui-sans-serif, system-ui, sans-serif; fill: #1a1a1a; }
    .small { font: 12px ui-sans-serif, system-ui, sans-serif; fill: #333; }
    .dim { font: 11px ui-monospace, monospace; fill: #444; }
  </style>
  <rect width="900" height="420" fill="#f7f5f1"/>
  <!-- downtube outline -->
  <path d="M80,120 L780,200 L780,310 L80,280 Z" fill="#c5c8ce" stroke="#333" stroke-width="2"/>
  <!-- cavity -->
  <rect x="100" y="150" width="640" height="80" fill="#f0b429" fill-opacity="0.35" stroke="#a67c00" stroke-width="2"/>
  <!-- three trays -->
  <rect x="108" y="158" width="204" height="64" fill="#2d6a4f" fill-opacity="0.7" stroke="#1b4332"/>
  <rect x="318" y="158" width="204" height="64" fill="#2d6a4f" fill-opacity="0.7" stroke="#1b4332"/>
  <rect x="528" y="158" width="204" height="64" fill="#2d6a4f" fill-opacity="0.7" stroke="#1b4332"/>
  <text x="160" y="195" class="small" fill="#fff">M1 + BMS</text>
  <text x="385" y="195" class="small" fill="#fff">M2 + NTC</text>
  <text x="595" y="195" class="small" fill="#fff">M3</text>
  <!-- controller bay -->
  <rect x="760" y="250" width="90" height="70" fill="#457b9d" fill-opacity="0.5" stroke="#1d3557"/>
  <text x="770" y="290" class="small">CTRL</text>
  <!-- labels -->
  <text x="100" y="40" class="label">Perfect Roadster  downtube energy bay (side view)</text>
  <text x="100" y="60" class="dim">cavity 640 × 56 × 80 mm clear · trays 204 × 52 × 76 · 6 mm gaps</text>
  <text x="100" y="360" class="dim">HT end  BB / controller bay</text>
  <line x1="100" y1="140" x2="740" y2="140" stroke="#333" stroke-width="1"/>
  <text x="380" y="132" class="dim">640 mm clear length</text>
</svg>
