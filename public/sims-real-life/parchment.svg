<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" preserveAspectRatio="none">
  <defs>
    <linearGradient id="p" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a2c1c"/>
      <stop offset="45%" stop-color="#2a1e14"/>
      <stop offset="100%" stop-color="#1a120c"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch" result="n"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.85  0 0 0 0 0.72  0 0 0 0 0.45  0 0 0 0.18 0" in="n"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#p)"/>
  <rect width="512" height="512" filter="url(#grain)" opacity="0.55"/>
  <rect width="512" height="512" fill="rgba(212,180,90,0.04)"/>
</svg>
