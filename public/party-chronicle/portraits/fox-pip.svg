<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="280" viewBox="0 0 240 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3024"/>
      <stop offset="100%" stop-color="#0a1410"/>
    </linearGradient>
  </defs>
  <rect width="240" height="280" fill="url(#bg)"/>
  <ellipse cx="120" cy="230" rx="70" ry="20" fill="#163828"/>
  <!-- fox body -->
  <ellipse cx="120" cy="170" rx="55" ry="35" fill="#c47a3d"/>
  <ellipse cx="120" cy="165" rx="40" ry="28" fill="#e09850"/>
  <!-- head -->
  <ellipse cx="120" cy="120" rx="38" ry="32" fill="#c47a3d"/>
  <ellipse cx="120" cy="125" rx="28" ry="22" fill="#e8b070"/>
  <!-- ears -->
  <path d="M85 105 L75 55 L105 95Z" fill="#c47a3d"/>
  <path d="M155 105 L165 55 L135 95Z" fill="#c47a3d"/>
  <path d="M88 100 L82 70 L102 95Z" fill="#f0d0b0"/>
  <path d="M152 100 L158 70 L138 95Z" fill="#f0d0b0"/>
  <!-- eyes -->
  <circle cx="105" cy="118" r="5" fill="#0a0e14"/>
  <circle cx="135" cy="118" r="5" fill="#0a0e14"/>
  <circle cx="106" cy="117" r="1.5" fill="#f4efe4"/>
  <circle cx="136" cy="117" r="1.5" fill="#f4efe4"/>
  <!-- nose / muzzle -->
  <ellipse cx="120" cy="135" rx="10" ry="7" fill="#f4efe4"/>
  <ellipse cx="120" cy="132" rx="4" ry="3" fill="#0a0e14"/>
  <!-- tail -->
  <path d="M170 175 Q210 140 200 200 Q180 195 170 175Z" fill="#c47a3d"/>
  <path d="M185 160 Q200 150 195 175" fill="#f0d0b0" opacity="0.7"/>
  <!-- frame -->
  <rect x="8" y="8" width="224" height="264" fill="none" stroke="#0a0e14" stroke-width="8"/>
  <rect x="14" y="14" width="212" height="252" fill="none" stroke="#e85d4c" stroke-width="3"/>
  <text x="120" y="258" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="16"
    fill="#f4efe4" stroke="#0a0e14" stroke-width="3" paint-order="stroke">PIP</text>
</svg>
