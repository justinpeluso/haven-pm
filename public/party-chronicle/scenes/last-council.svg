<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2030"/>
      <stop offset="100%" stop-color="#0c1018"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#sky)"/>
  
  <!-- standing stones -->
  <g fill="#3a4450" stroke="#0a0e14" stroke-width="3">
    <rect x="120" y="140" width="28" height="140"/><rect x="200" y="120" width="30" height="160"/>
    <rect x="410" y="120" width="30" height="160"/><rect x="490" y="140" width="28" height="140"/>
    <rect x="300" y="100" width="40" height="180"/>
  </g>
  <!-- circle ground -->
  <ellipse cx="320" cy="290" rx="180" ry="40" fill="#2a3038" stroke="#c4a35a" stroke-width="2" opacity="0.8"/>
  <!-- council beasts silhouettes around -->
  <g fill="#1a1018" opacity="0.85">
    <ellipse cx="180" cy="280" rx="20" ry="10"/><!-- fox -->
    <ellipse cx="460" cy="280" rx="22" ry="11"/><!-- wolf -->
    <ellipse cx="240" cy="300" rx="28" ry="14"/><!-- bear -->
    <ellipse cx="400" cy="300" rx="18" ry="16"/><!-- stag body hint -->
  </g>
  <!-- party center -->
  <g fill="#e8eef2">
    <circle cx="300" cy="275" r="6"/><circle cx="320" cy="272" r="6"/><circle cx="340" cy="275" r="6"/>
  </g>
  <!-- comic frame -->
  <rect x="8" y="8" width="624" height="344" fill="none" stroke="#0a0e14" stroke-width="10"/>
  <rect x="16" y="16" width="608" height="328" fill="none" stroke="#e8c96a" stroke-width="3"/>
  <rect x="12" y="12" width="14" height="14" fill="#e8c96a"/>
  <rect x="614" y="12" width="14" height="14" fill="#e8c96a"/>
  <rect x="12" y="334" width="14" height="14" fill="#5ecf9a"/>
  <rect x="614" y="334" width="14" height="14" fill="#5ecf9a"/>
  <text x="28" y="44" font-family="Impact, Arial Black, sans-serif" font-size="22"
    fill="#f4efe4" stroke="#0a0e14" stroke-width="4" paint-order="stroke">LAST COUNCIL</text>
</svg>
