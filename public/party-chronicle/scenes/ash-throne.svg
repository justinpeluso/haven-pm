<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#140808"/>
      <stop offset="100%" stop-color="#080404"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#sky)"/>
  
  <path d="M0 300 L640 300 L640 360 L0 360Z" fill="#1a1010"/>
  <!-- throne -->
  <path d="M260 280 L280 140 L360 140 L380 280Z" fill="#2a1818" stroke="#e85d4c" stroke-width="4"/>
  <rect x="290" y="160" width="60" height="80" fill="#1a0808"/>
  <path d="M290 140 L320 100 L350 140Z" fill="#4a2020" stroke="#c4a35a" stroke-width="2"/>
  <!-- serpent coil -->
  <path d="M200 260 Q280 200 320 240 Q360 280 440 220" fill="none" stroke="#5ecf9a" stroke-width="10" opacity="0.5"/>
  <circle cx="440" cy="215" r="12" fill="#3d9a7a"/>
  <circle cx="445" cy="212" r="3" fill="#f5d547"/>
  <!-- ash rain -->
  <g fill="#8a6060" opacity="0.4">
    <circle cx="100" cy="80" r="1.5"/><circle cx="200" cy="60" r="1"/><circle cx="400" cy="90" r="2"/><circle cx="500" cy="50" r="1.5"/>
  </g>
  <!-- comic frame -->
  <rect x="8" y="8" width="624" height="344" fill="none" stroke="#0a0e14" stroke-width="10"/>
  <rect x="16" y="16" width="608" height="328" fill="none" stroke="#e8c96a" stroke-width="3"/>
  <rect x="12" y="12" width="14" height="14" fill="#e8c96a"/>
  <rect x="614" y="12" width="14" height="14" fill="#e8c96a"/>
  <rect x="12" y="334" width="14" height="14" fill="#5ecf9a"/>
  <rect x="614" y="334" width="14" height="14" fill="#5ecf9a"/>
  <text x="28" y="44" font-family="Impact, Arial Black, sans-serif" font-size="22"
    fill="#f4efe4" stroke="#0a0e14" stroke-width="4" paint-order="stroke">ASH THRONE</text>
</svg>
