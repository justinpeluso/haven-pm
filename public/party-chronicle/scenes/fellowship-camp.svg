    <ellipse cx="400" cy="285" rx="16" ry="10"/><circle cx="400" cy="265" r="10"/>
    <ellipse cx="320" cy="310" rx="18" ry="8"/><circle cx="320" cy="295" r="9"/>
  </g>
  <!-- fox nearby -->
