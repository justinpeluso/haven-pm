  <rect x="16" y="16" width="608" height="328" fill="none" stroke="#e8c96a" stroke-width="3"/>
  <rect x="12" y="12" width="14" height="14" fill="#e8c96a"/>
  <rect x="614" y="12" width="14" height="14" fill="#e8c96a"/>
  <rect x="12" y="334" width="14" height="14" fill="#5ecf9a"/>
  <rect x="614" y="334" width="14" height="14" fill="#5ecf9a"/>
  <text x="28" y="44" font-family="Impact, Arial Black, sans-serif" font-size="22"
