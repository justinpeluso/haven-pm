  <rect x="140" y="90" width="24" height="180" fill="#5a3a28" stroke="#0a0e14" stroke-width="2"/>
  <rect x="476" y="90" width="24" height="180" fill="#5a3a28" stroke="#0a0e14" stroke-width="2"/>
