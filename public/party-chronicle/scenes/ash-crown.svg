<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1010"/>
      <stop offset="100%" stop-color="#080404"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#sky)"/>
  
  <ellipse cx="320" cy="300" rx="200" ry="40" fill="#2a1810"/>
  <!-- chamber walls -->
  <path d="M80 80 L80 300 L560 300 L560 80" fill="none" stroke="#3a2820" stroke-width="20"/>
  <!-- pedestal + crown -->
  <rect x="280" y="220" width="80" height="50" fill="#3a2a20" stroke="#0a0e14" stroke-width="3"/>
  <path d="M290 200 L300 170 L310 195 L320 160 L330 195 L340 170 L350 200Z" fill="#6a6a70" stroke="#c4a35a" stroke-width="2"/>
  <ellipse cx="320" cy="200" rx="30" ry="6" fill="#4a4a50"/>
  <!-- ash motes -->
  <g fill="#e85d4c" opacity="0.4">
    <circle cx="200" cy="120" r="2"/><circle cx="400" cy="100" r="1.5"/><circle cx="250" cy="160" r="1"/><circle cx="450" cy="140" r="2"/>
  </g>
  <!-- herald shadow -->
  <path d="M480 280 L500 180 L520 280Z" fill="#1a0808" opacity="0.7"/>
  <circle cx="500" cy="170" r="14" fill="#1a0808" opacity="0.7"/>
  <!-- comic frame -->
  <rect x="8" y="8" width="624" height="344" fill="none" stroke="#0a0e14" stroke-width="10"/>
  <rect x="16" y="16" width="608" height="328" fill="none" stroke="#e8c96a" stroke-width="3"/>
  <rect x="12" y="12" width="14" height="14" fill="#e8c96a"/>
  <rect x="614" y="12" width="14" height="14" fill="#e8c96a"/>
  <rect x="12" y="334" width="14" height="14" fill="#5ecf9a"/>
  <rect x="614" y="334" width="14" height="14" fill="#5ecf9a"/>
  <text x="28" y="44" font-family="Impact, Arial Black, sans-serif" font-size="22"
    fill="#f4efe4" stroke="#0a0e14" stroke-width="4" paint-order="stroke">CROWN OF ASH</text>
</svg>
