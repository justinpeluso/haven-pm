<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3038"/>
      <stop offset="100%" stop-color="#121820"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#sky)"/>
  
  <!-- mist -->
  <ellipse cx="320" cy="200" rx="300" ry="80" fill="#8aa0ad" opacity="0.15"/>
  <ellipse cx="200" cy="240" rx="180" ry="50" fill="#8aa0ad" opacity="0.12"/>
  <!-- gorge -->
  <path d="M0 280 L200 320 L440 310 L640 290 L640 360 L0 360Z" fill="#1a2030"/>
  <!-- bridge -->
  <rect x="120" y="250" width="400" height="16" fill="#5a4030" stroke="#0a0e14" stroke-width="3"/>
  <rect x="140" y="200" width="10" height="50" fill="#4a3020"/>
  <rect x="490" y="200" width="10" height="50" fill="#4a3020"/>
  <path d="M145 205 Q320 170 495 205" fill="none" stroke="#3a2818" stroke-width="4"/>
  <!-- figures on bridge -->
  <g fill="#0a1018">
    <path d="M280 250 L283 220 L292 220 L295 250Z"/><circle cx="287" cy="214" r="7"/>
    <path d="M310 250 L313 222 L321 222 L324 250Z"/><circle cx="317" cy="216" r="6"/>
  </g>
  <!-- serpent hint under -->
  <path d="M300 310 Q360 290 400 320" fill="none" stroke="#5ecf9a" stroke-width="3" opacity="0.35"/>
  <!-- comic frame -->
  <rect x="8" y="8" width="624" height="344" fill="none" stroke="#0a0e14" stroke-width="10"/>
  <rect x="16" y="16" width="608" height="328" fill="none" stroke="#e8c96a" stroke-width="3"/>
  <rect x="12" y="12" width="14" height="14" fill="#e8c96a"/>
  <rect x="614" y="12" width="14" height="14" fill="#e8c96a"/>
  <rect x="12" y="334" width="14" height="14" fill="#5ecf9a"/>
  <rect x="614" y="334" width="14" height="14" fill="#5ecf9a"/>
  <text x="28" y="44" font-family="Impact, Arial Black, sans-serif" font-size="22"
    fill="#f4efe4" stroke="#0a0e14" stroke-width="4" paint-order="stroke">MISTY BRIDGE</text>
</svg>
