  <path d="M180 80 Q280 40 400 70 Q360 90 280 85 Q220 100 180 80Z" fill="#1a0808" opacity="0.7"/>
  <path d="M200 75 L140 50 L160 80Z" fill="#1a0808" opacity="0.6"/>
  <path d="M380 70 L460 40 L440 85Z" fill="#1a0808" opacity="0.6"/>
