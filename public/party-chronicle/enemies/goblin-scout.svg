<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="360" viewBox="0 0 320 360" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#241810"/>
      <stop offset="100%" stop-color="#0c100c"/>
    </linearGradient>
    <filter id="ink" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="0" flood-color="#0a0e14" flood-opacity="0.9"/>
    </filter>
  </defs>
  <rect width="320" height="360" fill="url(#bg)"/>
  <ellipse cx="160" cy="300" rx="90" ry="22" fill="#000" opacity="0.35"/>
  <g filter="url(#ink)">

  <!-- legs -->
  <path d="M115 250 L105 295 L125 295 Z" fill="#3a6030" stroke="#0a0e14" stroke-width="3"/>
  <path d="M195 250 L185 295 L210 295 Z" fill="#3a6030" stroke="#0a0e14" stroke-width="3"/>
  <!-- body -->
  <ellipse cx="160" cy="210" rx="62" ry="55" fill="#4f8a3c" stroke="#0a0e14" stroke-width="4"/>
  <ellipse cx="160" cy="200" rx="42" ry="36" fill="#6bb04a"/>
  <!-- arms -->
  <path d="M100 185 Q70 210 85 245" fill="none" stroke="#4f8a3c" stroke-width="18" stroke-linecap="round"/>
  <path d="M220 185 Q250 210 235 245" fill="none" stroke="#4f8a3c" stroke-width="18" stroke-linecap="round"/>
  <circle cx="85" cy="250" r="12" fill="#6bb04a" stroke="#0a0e14" stroke-width="3"/>
  <circle cx="235" cy="250" r="12" fill="#6bb04a" stroke="#0a0e14" stroke-width="3"/>
  <!-- club -->
  <rect x="228" y="160" width="14" height="95" rx="4" fill="#8b5a2b" stroke="#0a0e14" stroke-width="3" transform="rotate(18 235 207)"/>
  <ellipse cx="248" cy="155" rx="22" ry="16" fill="#6a4420" stroke="#0a0e14" stroke-width="3"/>
  <!-- head -->
  <circle cx="160" cy="120" r="52" fill="#4f8a3c" stroke="#0a0e14" stroke-width="4"/>
  <ellipse cx="160" cy="128" rx="38" ry="32" fill="#6bb04a"/>
  <!-- ears -->
  <path d="M115 105 L85 40 L135 95 Z" fill="#3a6030" stroke="#0a0e14" stroke-width="3"/>
  <path d="M205 105 L235 40 L185 95 Z" fill="#3a6030" stroke="#0a0e14" stroke-width="3"/>
  <path d="M118 100 L95 55 L132 92 Z" fill="#6bb04a"/>
  <path d="M202 100 L225 55 L188 92 Z" fill="#6bb04a"/>
  <!-- eyes -->
  <ellipse cx="140" cy="112" rx="14" ry="16" fill="#f5d547" stroke="#0a0e14" stroke-width="3"/>
  <ellipse cx="180" cy="112" rx="14" ry="16" fill="#f5d547" stroke="#0a0e14" stroke-width="3"/>
  <circle cx="142" cy="116" r="6" fill="#0a0e14"/>
  <circle cx="182" cy="116" r="6" fill="#0a0e14"/>
  <circle cx="144" cy="114" r="2" fill="#f4efe4"/>
  <circle cx="184" cy="114" r="2" fill="#f4efe4"/>
  <!-- nose teeth -->
  <ellipse cx="160" cy="140" rx="14" ry="10" fill="#2a4020" stroke="#0a0e14" stroke-width="2"/>
  <path d="M145 152 Q160 168 175 152" fill="#3a6030" stroke="#0a0e14" stroke-width="3"/>
  <path d="M150 155 L153 148 L156 155" fill="#f4efe4"/>
  <path d="M164 155 L167 148 L170 155" fill="#f4efe4"/>

  </g>
  <rect x="10" y="10" width="300" height="340" fill="none" stroke="#0a0e14" stroke-width="10"/>
  <rect x="18" y="18" width="284" height="324" fill="none" stroke="#e85d4c" stroke-width="4"/>
  <rect x="26" y="26" width="268" height="308" fill="none" stroke="#f4efe4" stroke-width="1.5" opacity="0.55"/>
  <text x="160" y="338" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="22"
    fill="#f4efe4" stroke="#0a0e14" stroke-width="4" paint-order="stroke">GOBLIN</text>
</svg>
