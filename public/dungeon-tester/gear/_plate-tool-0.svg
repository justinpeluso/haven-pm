<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none" role="img" aria-label="tool plate workshop">
  <defs>
    <linearGradient id="sky-to0" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3024"/>
      <stop offset="45%" stop-color="#221c14"/>
      <stop offset="100%" stop-color="#0a0804"/>
    </linearGradient>
    <radialGradient id="lamp-to0" cx="25%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#c4893a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c4893a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="256" height="256" fill="url(#sky-to0)"/>
  <ellipse cx="60" cy="50" rx="80" ry="55" fill="url(#lamp-to0)"/>
  <!-- pegboard -->
  <g fill="#3a2818" opacity="0.35">
    <circle cx="50" cy="50" r="3"/><circle cx="90" cy="50" r="3"/><circle cx="130" cy="50" r="3"/>
    <circle cx="170" cy="50" r="3"/><circle cx="210" cy="50" r="3"/>
    <circle cx="50" cy="80" r="3"/><circle cx="90" cy="80" r="3"/><circle cx="210" cy="80" r="3"/>
  </g>
  <path d="M0 175 H256 V256 H0 Z" fill="#1a1410"/>
  <path d="M0 175 H256" stroke="#5a4030" stroke-width="8"/>
  <!-- wrench + hammer -->
  <g>
    <path d="M70 90 L100 160 L120 150 L90 80 Z" fill="#6a7080" stroke="#0a0704" stroke-width="3"/>
    <circle cx="80" cy="75" r="16" fill="none" stroke="#8a9aaa" stroke-width="8"/>
    <path d="M150 70 V175" stroke="#5a3820" stroke-width="10" stroke-linecap="round"/>
    <path d="M130 70 H170 L175 95 H125 Z" fill="#4a4a52" stroke="#0a0704" stroke-width="3"/>
    <path d="M150 70 V175" stroke="#c9a227" stroke-width="2" opacity="0.4"/>
  </g>
  <rect width="256" height="256" fill="none" stroke="#0a0704" stroke-width="16" opacity="0.4"/>
  <!-- pulp corner marks -->
  <path d="M10 10 H42 M10 10 V42" stroke="#c9a227" stroke-width="2" opacity="0.4"/>
  <path d="M246 10 H214 M246 10 V42" stroke="#c9a227" stroke-width="2" opacity="0.4"/>
  <path d="M10 246 H42 M10 246 V214" stroke="#c9a227" stroke-width="2" opacity="0.4"/>
