<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none" role="img" aria-label="gun plate saloon flash">
  <defs>
    <linearGradient id="sky-g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="60%" stop-color="#0e0a08"/>
      <stop offset="100%" stop-color="#060402"/>
    </linearGradient>
    <radialGradient id="flash-g1" cx="78%" cy="42%" r="40%">
      <stop offset="0%" stop-color="#fff8ec" stop-opacity="0.85"/>
      <stop offset="25%" stop-color="#e8c547" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#c44a1f" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0a0704" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="256" height="256" fill="url(#sky-g1)"/>
  <ellipse cx="200" cy="110" rx="90" ry="70" fill="url(#flash-g1)"/>
  <!-- saloon slats -->
  <g stroke="#3a2818" stroke-width="8" opacity="0.4">
    <path d="M0 40 H256"/><path d="M0 70 H256"/><path d="M0 100 H256"/>
  </g>
  <path d="M0 185 H256 V256 H0 Z" fill="#14100c"/>
  <path d="M0 185 Q128 170 256 185" fill="none" stroke="#c9a227" stroke-width="2" opacity="0.35"/>
  <!-- gun pointing right into flash -->
  <g transform="translate(-10,5)">
    <path d="M30 115 H155 L172 98 H200 V125 H172 L155 140 H100 V178 H75 V140 H30 Z" fill="#4a4a52" stroke="#0a0704" stroke-width="3.5"/>
    <rect x="18" y="105" width="28" height="40" rx="3" fill="#3a2414" stroke="#0a0704" stroke-width="3"/>
    <circle cx="48" cy="125" r="6" fill="#c9a227"/>
  </g>
  <!-- smoke rings -->
  <circle cx="210" cy="100" r="14" fill="none" stroke="#c4a882" stroke-width="2" opacity="0.4"/>
  <circle cx="225" cy="88" r="8" fill="none" stroke="#8a6a4a" stroke-width="1.5" opacity="0.35"/>
  <rect width="256" height="256" fill="none" stroke="#0a0704" stroke-width="18" opacity="0.45"/>
  <!-- pulp corner marks -->
  <path d="M10 10 H42 M10 10 V42" stroke="#c9a227" stroke-width="2" opacity="0.4"/>
  <path d="M246 10 H214 M246 10 V42" stroke="#c9a227" stroke-width="2" opacity="0.4"/>
  <path d="M10 246 H42 M10 246 V214" stroke="#c9a227" stroke-width="2" opacity="0.4"/>
  <path d="M246 246 H214 M246 246 V214" stroke="#c9a227" stroke-width="2" opacity="0.4"/>
</svg>
