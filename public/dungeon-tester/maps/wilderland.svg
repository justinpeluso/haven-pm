  <g opacity="0.95">
    <path d="M1180 520 L1240 180 L1280 200 L1340 140 L1380 210 L1440 160 L1480 520Z" fill="#061018"/>
    <path d="M1220 520 L1260 240 L1300 260 L1340 200 L1380 270 L1420 520Z" fill="#0a1824" opacity="0.85"/>
