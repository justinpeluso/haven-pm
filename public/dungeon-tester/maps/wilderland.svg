    <rect x="395" y="335" width="9" height="9" transform="rotate(45 400 340)"/>
    <rect x="715" y="615" width="9" height="9" transform="rotate(45 720 620)"/>
    <rect x="955" y="275" width="10" height="10" transform="rotate(45 960 280)"/>
    <rect x="1195" y="455" width="9" height="9" transform="rotate(45 1200 460)"/>
    <rect x="1415" y="555" width="10" height="10" transform="rotate(45 1420 560)"/>
