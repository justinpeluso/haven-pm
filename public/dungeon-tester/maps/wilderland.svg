  <g fill="#ffe0a0" opacity="0.35" font-family="Courier New, monospace" font-size="11" font-weight="700">
    <text x="188" y="558">!</text>
    <text x="408" y="338">!</text>
    <text x="728" y="618">!</text>
    <text x="968" y="278">!</text>
    <text x="1208" y="458">!</text>
    <text x="1428" y="558">!</text>
  </g>

  <rect width="1600" height="1000" fill="url(#nwMist)"/>

  <!-- landmark labels (story-bible display names) -->
