    <text x="380" y="690" font-size="16">Palefen Reservoir</text>
    <text x="200" y="400" font-size="15">Widowmere Mirror</text>
    <text x="700" y="500" font-size="16">Silverthread Coolant</text>
    <text x="480" y="250" font-size="18">Thornspine Ridgeline</text>
    <text x="860" y="640" font-size="15">Mirehollow Stacks</text>
    <text x="1040" y="210" font-size="16">Coldgate Uplink</text>
    <text x="760" y="770" font-size="15">Reedfen Marshes</text>
    <text x="1280" y="680" font-size="15">Westwind Freeholds</text>
  </g>

  <!-- woodcut frame -->
  <rect x="12" y="12" width="1576" height="976" fill="none" stroke="#0d0a08" stroke-width="14"/>
  <rect x="24" y="24" width="1552" height="952" fill="none" stroke="#c4a35a" stroke-width="3"/>
  <rect x="20" y="20" width="14" height="14" fill="#c4a35a"/>
  <rect x="1566" y="20" width="14" height="14" fill="#c4a35a"/>
  <rect x="20" y="966" width="14" height="14" fill="#8b3a2a"/>
  <rect x="1566" y="966" width="14" height="14" fill="#8b3a2a"/>

  <text x="48" y="70" font-family="Impact, Arial Black, sans-serif" font-size="36"
    fill="#f4efe4" stroke="#0d0a08" stroke-width="6" paint-order="stroke">NEON WILDERLAND</text>
  <text x="48" y="100" font-family="Courier New, monospace" font-size="14" fill="#7affc4" opacity="0.8">Nine marches · side jobs off the chrome road</text>
</svg>
