<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" fill="none">
  <defs>
    <linearGradient id="nwSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#061510"/>
      <stop offset="40%" stop-color="#0e2418"/>
      <stop offset="100%" stop-color="#08140e"/>
    </linearGradient>
    <radialGradient id="nwBiolume" cx="28%" cy="42%" r="48%">
      <stop offset="0%" stop-color="#3dff9a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3dff9a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nwSpireGlow" cx="82%" cy="38%" r="36%">
      <stop offset="0%" stop-color="#ff3d9a" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#3dffe8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3dffe8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nwCoolant" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#4ad4e8"/>
      <stop offset="100%" stop-color="#1a5a68"/>
    </radialGradient>
    <linearGradient id="nwRoad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a6a3a"/>
      <stop offset="45%" stop-color="#d4b070"/>
      <stop offset="75%" stop-color="#9ad4c0"/>
      <stop offset="100%" stop-color="#c0e8ff"/>
    </linearGradient>
    <linearGradient id="nwMist" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7affc4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7affc4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff6ab8" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="nwBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#nwSky)"/>
