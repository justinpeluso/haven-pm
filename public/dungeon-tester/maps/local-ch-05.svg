<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="200" viewBox="0 0 720 200" fill="none">
  <defs>
    <linearGradient id="bg-ch05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1428"/>
      <stop offset="50%" stop-color="#120c1c"/>
      <stop offset="100%" stop-color="#08060e"/>
    </linearGradient>
    <linearGradient id="keep-ch05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3648"/>
      <stop offset="100%" stop-color="#1a1824"/>
    </linearGradient>
    <linearGradient id="neon-ch05" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4d8a"/>
      <stop offset="100%" stop-color="#6a2aff"/>
    </linearGradient>
    <radialGradient id="glow-ch05" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ff4d8a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff4d8a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="720" height="200" fill="url(#bg-ch05)"/>
