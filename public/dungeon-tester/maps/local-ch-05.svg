  <ellipse cx="120" cy="40" rx="50" ry="14" fill="#6a2aff" opacity="0.12"/>
  <ellipse cx="600" cy="36" rx="60" ry="16" fill="#ff4d8a" opacity="0.1"/>

  <!-- smoke / ash canopy -->
  <path d="M0 0 Q80 40 160 10 T320 8 T480 20 T640 6 T720 18 L720 0Z" fill="#0a0810" opacity="0.7"/>
  <path d="M40 8 Q100 36 180 12" fill="none" stroke="#4a3848" stroke-width="6" opacity="0.4" stroke-linecap="round"/>
  <path d="M280 4 Q360 32 440 10" fill="none" stroke="#3a2838" stroke-width="8" opacity="0.35" stroke-linecap="round"/>
  <path d="M520 6 Q600 34 700 12" fill="none" stroke="#4a3848" stroke-width="6" opacity="0.4" stroke-linecap="round"/>

