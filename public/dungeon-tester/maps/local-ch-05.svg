    <rect x="200" y="44" width="10" height="10" fill="#3a3648"/><rect x="219" y="44" width="10" height="10" fill="#3a3648"/><rect x="238" y="44" width="10" height="10" fill="#3a3648"/>
  </g>
  <g>
