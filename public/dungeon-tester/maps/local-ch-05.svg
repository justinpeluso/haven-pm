    <circle cx="140" cy="38" r="4"/>
    <line x1="128" y1="42" x2="118" y2="48" stroke="#1a120c" stroke-width="2"/>
    <line x1="152" y1="42" x2="162" y2="48" stroke="#1a120c" stroke-width="2"/>
    <ellipse cx="580" cy="38" rx="16" ry="5"/>
    <circle cx="580" cy="34" r="4"/>
    <line x1="566" y1="38" x2="556" y2="44" stroke="#1a120c" stroke-width="2"/>
    <line x1="594" y1="38" x2="604" y2="44" stroke="#1a120c" stroke-width="2"/>
