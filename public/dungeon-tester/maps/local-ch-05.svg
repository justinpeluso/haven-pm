  <path d="M0 95 L60 70 L120 88 L180 62 L240 85 L300 68 L360 90 L420 64 L500 82 L580 60 L660 86 L720 72 L720 200 L0 200Z" fill="#14101c"/>
  <path d="M0 110 Q180 95 360 112 T720 105 L720 200 L0 200Z" fill="#1a1424" opacity="0.9"/>

