  <g stroke="#3a3040" stroke-width="3">
    <line x1="60" y1="155" x2="60" y2="130"/><line x1="100" y1="158" x2="100" y2="128"/>
    <line x1="620" y1="155" x2="620" y2="128"/><line x1="660" y1="158" x2="660" y2="132"/>
  </g>
  <circle cx="60" cy="128" r="3" fill="#ff4d8a" opacity="0.6"/>
  <circle cx="100" cy="126" r="3" fill="#6a2aff" opacity="0.55"/>
  <circle cx="620" cy="126" r="3" fill="#ff4d8a" opacity="0.55"/>
  <circle cx="660" cy="130" r="3" fill="#6a2aff" opacity="0.55"/>

  <!-- trail band (YOU overlay ~42% height, L→R) — approaches through gate -->
  <path d="M28 96 Q150 76 280 98 T500 86 T692 100" fill="none" stroke="#1a120c" stroke-width="14" stroke-linecap="round" opacity="0.55"/>
  <path d="M28 96 Q150 76 280 98 T500 86 T692 100" fill="none" stroke="#c4a35a" stroke-width="9" stroke-linecap="round" opacity="0.9"/>
  <path d="M28 96 Q150 76 280 98 T500 86 T692 100" fill="none" stroke="#1a120c" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
  <g fill="#f4efe4" stroke="#1a120c" stroke-width="2">
    <circle cx="50" cy="93" r="5"/>
    <circle cx="140" cy="80" r="5"/>
    <circle cx="250" cy="95" r="5"/>
    <circle cx="360" cy="94" r="5"/>
    <circle cx="470" cy="88" r="5"/>
    <circle cx="570" cy="90" r="5"/>
    <circle cx="660" cy="98" r="5"/>
  </g>

  <!-- comic ink + gold frame -->
  <rect x="6" y="6" width="708" height="188" fill="none" stroke="#1a120c" stroke-width="8"/>
  <rect x="12" y="12" width="696" height="176" fill="none" stroke="#c4a35a" stroke-width="2.5"/>
  <rect x="10" y="10" width="12" height="12" fill="#c4a35a"/>
  <rect x="698" y="10" width="12" height="12" fill="#c4a35a"/>
  <rect x="10" y="178" width="12" height="12" fill="#8b3a2a"/>
  <rect x="698" y="178" width="12" height="12" fill="#8b3a2a"/>

  <text x="24" y="38" font-family="Impact, Arial Black, sans-serif" font-size="22"
    fill="#f4efe4" stroke="#1a120c" stroke-width="4" paint-order="stroke">HELIX GATE</text>
  <text x="24" y="182" font-family="Courier New, monospace" font-size="11" fill="#d48ab0" opacity="0.75">LOCAL MARCH — CORP BORDER</text>
</svg>
