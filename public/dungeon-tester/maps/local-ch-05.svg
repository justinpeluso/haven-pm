    <rect x="472" y="48" width="48" height="90" fill="url(#keep-ch05)" stroke="#1a120c" stroke-width="3"/>
    <path d="M467 48 L496 28 L525 48Z" fill="#4a4058" stroke="#1a120c" stroke-width="2"/>
    <rect x="484" y="70" width="12" height="14" fill="#6a2aff" opacity="0.5"/>
    <rect x="500" y="70" width="12" height="14" fill="#ff4d8a" opacity="0.5"/>
