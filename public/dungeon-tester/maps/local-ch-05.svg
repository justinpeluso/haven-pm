  <!-- wall glyphs / numbers -->
  <text x="260" y="146" font-family="Impact, Arial Black, sans-serif" font-size="10" fill="#6a2aff" opacity="0.5">SCAN</text>
  <text x="400" y="146" font-family="Impact, Arial Black, sans-serif" font-size="10" fill="#ff4d8a" opacity="0.5">TOLL</text>

  <!-- ground approach -->
  <path d="M0 155 Q180 145 360 158 T720 152 L720 200 L0 200Z" fill="#16101a"/>
  <path d="M0 170 L720 165 L720 200 L0 200Z" fill="#0e0a12" opacity="0.9"/>
  <path d="M0 178 Q200 172 400 182 T720 176" fill="none" stroke="#1a1008" stroke-width="4" opacity="0.45"/>
