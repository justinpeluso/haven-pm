    <path d="M175 88 L175 50 M175 58 L158 42 M175 58 L192 40"/>
    <path d="M510 86 L510 52 M510 60 L492 44 M510 60 L528 42"/>
    <path d="M670 84 L670 48 M670 56 L652 40 M670 56 L688 38"/>
  </g>
  <circle cx="40" cy="48" r="2" fill="#1affc8" opacity="0.7"/>
