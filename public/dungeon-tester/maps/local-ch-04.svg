  <path d="M30 92 Q140 72 260 96 T480 84 T690 100" fill="none" stroke="#1a120c" stroke-width="14" stroke-linecap="round" opacity="0.55"/>
  <path d="M30 92 Q140 72 260 96 T480 84 T690 100" fill="none" stroke="#c4a35a" stroke-width="9" stroke-linecap="round" opacity="0.9"/>
  <path d="M30 92 Q140 72 260 96 T480 84 T690 100" fill="none" stroke="#1a120c" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
