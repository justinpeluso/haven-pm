    <circle cx="150" cy="77" r="5"/>
    <circle cx="250" cy="94" r="5"/>
    <circle cx="360" cy="92" r="5"/>
    <circle cx="470" cy="84" r="5"/>
    <circle cx="570" cy="90" r="5"/>
    <circle cx="660" cy="98" r="5"/>
  </g>

  <!-- neon brand marks along shore -->
  <text x="200" y="168" font-family="Impact, Arial Black, sans-serif" font-size="9" fill="#1affc8" opacity="0.35">BRAND</text>
  <text x="480" y="170" font-family="Impact, Arial Black, sans-serif" font-size="9" fill="#c45aff" opacity="0.3">CARGO</text>

  <!-- comic ink + gold frame -->
  <rect x="6" y="6" width="708" height="188" fill="none" stroke="#1a120c" stroke-width="8"/>
  <rect x="12" y="12" width="696" height="176" fill="none" stroke="#c4a35a" stroke-width="2.5"/>
  <rect x="10" y="10" width="12" height="12" fill="#c4a35a"/>
  <rect x="698" y="10" width="12" height="12" fill="#c4a35a"/>
  <rect x="10" y="178" width="12" height="12" fill="#8b3a2a"/>
  <rect x="698" y="178" width="12" height="12" fill="#8b3a2a"/>

  <text x="24" y="38" font-family="Impact, Arial Black, sans-serif" font-size="22"
    fill="#f4efe4" stroke="#1a120c" stroke-width="4" paint-order="stroke">CHROMEVEIL</text>
  <text x="24" y="182" font-family="Courier New, monospace" font-size="11" fill="#7ad4e8" opacity="0.75">LOCAL MARCH — NEON WATER</text>
</svg>
