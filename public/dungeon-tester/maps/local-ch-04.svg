  <path d="M200 68 L240 38 L270 60" fill="none" stroke="#3a5060" stroke-width="2"/>
  <path d="M480 66 L520 36 L555 58" fill="none" stroke="#3a5060" stroke-width="2"/>
  <path d="M620 68 L655 40 L690 62" fill="none" stroke="#4a6878" stroke-width="2"/>

