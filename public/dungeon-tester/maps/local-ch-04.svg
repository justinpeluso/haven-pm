<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="200" viewBox="0 0 720 200" fill="none">
  <defs>
    <linearGradient id="bg-ch04" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1824"/>
      <stop offset="45%" stop-color="#122830"/>
      <stop offset="100%" stop-color="#061018"/>
    </linearGradient>
    <linearGradient id="neon-ch04" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1affc8"/>
      <stop offset="50%" stop-color="#4de8ff"/>
      <stop offset="100%" stop-color="#c45aff"/>
    </linearGradient>
    <linearGradient id="chrome-ch04" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a9aaa"/>
      <stop offset="40%" stop-color="#d0d8e0"/>
      <stop offset="100%" stop-color="#3a4858"/>
    </linearGradient>
    <linearGradient id="water-ch04" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e3a48"/>
      <stop offset="50%" stop-color="#1a6070"/>
      <stop offset="100%" stop-color="#061820"/>
