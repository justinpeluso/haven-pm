  <path d="M0 0 L40 28 L70 8 L110 36 L150 12 L200 40 L250 6 L300 32 L360 10 L420 38 L480 4 L540 30 L600 8 L660 34 L720 0 Z" fill="#061018" opacity="0.55"/>

