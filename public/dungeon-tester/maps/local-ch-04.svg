  <path d="M0 170 Q100 162 200 172 T400 168 T720 175 L720 200 L0 200Z" fill="#1a1410" opacity="0.85"/>
  <path d="M0 182 Q160 176 320 186 T720 180" fill="none" stroke="#0a0808" stroke-width="4" opacity="0.4"/>
