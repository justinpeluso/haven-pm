    <path d="M340 128 V118 M360 128 V116" stroke="#8a9aaa" stroke-width="2"/>
    <circle cx="340" cy="116" r="3" fill="#e85d4c" opacity="0.8"/>
    <circle cx="360" cy="114" r="3" fill="#1affc8" opacity="0.7"/>
  </g>
