  <rect x="10" y="10" width="12" height="12" fill="#c4a35a"/>
  <rect x="698" y="10" width="12" height="12" fill="#c4a35a"/>
  <rect x="10" y="178" width="12" height="12" fill="#8b3a2a"/>
