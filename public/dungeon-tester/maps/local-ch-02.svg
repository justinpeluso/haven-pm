  <ellipse cx="620" cy="78" rx="320" ry="38" fill="#e0a050" opacity="0.13" filter="url(#blur2)"/>
  <ellipse cx="420" cy="130" rx="260" ry="30" fill="#f0b060" opacity="0.1" filter="url(#blur2)"/>

