<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="260" viewBox="0 0 960 260" fill="none">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2410"/>
      <stop offset="45%" stop-color="#5c3a16"/>
      <stop offset="100%" stop-color="#1a1008"/>
    </linearGradient>
    <radialGradient id="sun2" cx="86%" cy="18%" r="42%">
      <stop offset="0%" stop-color="#ffb040" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#ff8040" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff6040" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trail2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a07038"/>
      <stop offset="50%" stop-color="#e0b060"/>
      <stop offset="100%" stop-color="#b88848"/>
    </linearGradient>
    <filter id="blur2" x="-20%" y="-20%" width="140%" height="140%">
