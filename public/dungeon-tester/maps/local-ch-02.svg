    <circle cx="100" cy="115" r="4" fill="#1a1008" opacity="0.7"/><circle cx="100" cy="115" r="2" fill="#e0b060"/>
    <circle cx="220" cy="98" r="4" fill="#1a1008" opacity="0.7"/><circle cx="220" cy="98" r="2" fill="#e0b060"/>
    <circle cx="340" cy="112" r="4" fill="#1a1008" opacity="0.7"/><circle cx="340" cy="112" r="2" fill="#e0b060"/>
    <circle cx="460" cy="108" r="4" fill="#1a1008" opacity="0.7"/><circle cx="460" cy="108" r="2" fill="#e0b060"/>
    <circle cx="580" cy="118" r="4" fill="#1a1008" opacity="0.7"/><circle cx="580" cy="118" r="2" fill="#e0b060"/>
    <circle cx="700" cy="106" r="4" fill="#1a1008" opacity="0.7"/><circle cx="700" cy="106" r="2" fill="#e0b060"/>
    <circle cx="820" cy="114" r="4" fill="#1a1008" opacity="0.7"/><circle cx="820" cy="114" r="2" fill="#e0b060"/>
