  <path d="M475 84 L545 48 L595 92Z" fill="#3a2410" opacity="0.88"/>
  <path d="M715 78 L785 42 L845 88Z" fill="#4a2e14" opacity="0.8"/>
  <path d="M300 90 L350 60 L390 95Z" fill="#5a3818" opacity="0.45"/>

