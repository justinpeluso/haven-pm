  <!-- woodcut frame -->
  <rect x="6" y="6" width="948" height="248" fill="none" stroke="#0d0a08" stroke-width="10"/>
  <rect x="14" y="14" width="932" height="232" fill="none" stroke="#c4a35a" stroke-width="2.5"/>
  <rect x="10" y="10" width="12" height="12" fill="#c4a35a"/>
  <rect x="938" y="10" width="12" height="12" fill="#c4a35a"/>
  <rect x="10" y="238" width="12" height="12" fill="#8b3a2a"/>
  <rect x="938" y="238" width="12" height="12" fill="#8b3a2a"/>
  <text x="28" y="42" font-family="Impact, Arial Black, sans-serif" font-size="22"
